<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4efe6"/>
      <stop offset="100%" stop-color="#ede5d8"/>
    </linearGradient>
    <linearGradient id="fabric" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#eedbb8"/>
      <stop offset="50%" stop-color="#e4cc9e"/>
      <stop offset="100%" stop-color="#d8bc88"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0.5)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <rect width="300" height="400" fill="url(#bg)"/>
  <ellipse cx="150" cy="374" rx="62" ry="7" fill="rgba(0,0,0,0.09)"/>

  <!-- Dress body — bias cut flare -->
  <path d="M 118,72
           C 118,72 112,80 110,88
           L 80,240
           C 72,275 68,300 65,355
           L 235,355
           C 232,300 228,275 220,240
           L 190,88
           C 188,80 182,72 182,72
           Z"
        fill="url(#fabric)" stroke="#c8a870" stroke-width="1.2"/>

  <!-- Silk sheen overlay -->
  <path d="M 130,72 L 110,88 L 90,200 L 140,200 Z"
        fill="url(#sheen)" opacity="0.6"/>

  <!-- Left strap -->
  <rect x="124" y="42" width="10" height="32" rx="3"
        fill="#e0c890" stroke="#c8a870" stroke-width="1"/>
  <!-- Right strap -->
  <rect x="166" y="42" width="10" height="32" rx="3"
        fill="#e0c890" stroke="#c8a870" stroke-width="1"/>

  <!-- Neckline — shallow V -->
  <path d="M 118,72 C 125,88 138,96 150,98 C 162,96 175,88 182,72"
        fill="none" stroke="#c8a870" stroke-width="1"/>

  <!-- Bias seam line -->
  <path d="M 148,98 C 146,160 138,240 128,355"
        fill="none" stroke="#c8a870" stroke-width="0.7" stroke-dasharray="5,4" opacity="0.5"/>

  <!-- Cowl drape hint at chest -->
  <path d="M 125,80 C 135,94 145,98 150,98 C 155,98 165,94 175,80"
        fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>

  <!-- Hem line detail -->
  <path d="M 65,355 C 90,350 130,348 150,349 C 170,348 210,350 235,355"
        fill="none" stroke="#c8a870" stroke-width="0.8"/>
</svg>
