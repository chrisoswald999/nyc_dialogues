<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f2ec"/>
      <stop offset="100%" stop-color="#edeae2"/>
    </linearGradient>
    <linearGradient id="fabric" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#f2efe6"/>
      <stop offset="50%" stop-color="#e8e4d8"/>
      <stop offset="100%" stop-color="#dcd8cc"/>
    </linearGradient>
  </defs>

  <rect width="300" height="400" fill="url(#bg)"/>
  <ellipse cx="150" cy="372" rx="68" ry="7" fill="rgba(0,0,0,0.08)"/>

  <!-- Main body -->
  <path d="M 88,105
           L 68,115
           L 62,320
           L 238,320
           L 232,115
           L 212,105
           Z"
        fill="url(#fabric)" stroke="#c8c4b8" stroke-width="1.2" stroke-linejoin="round"/>

  <!-- Left sleeve (short) -->
  <path d="M 88,105 L 45,118 L 40,195 L 82,198 L 88,150 Z"
        fill="url(#fabric)" stroke="#c8c4b8" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Right sleeve (short) -->
  <path d="M 212,105 L 255,118 L 260,195 L 218,198 L 212,150 Z"
        fill="url(#fabric)" stroke="#c8c4b8" stroke-width="1.2" stroke-linejoin="round"/>

  <!-- Crew neck ribbing — 4 horizontal lines -->
  <path d="M 118,80 C 126,72 140,68 150,68 C 160,68 174,72 182,80 L 185,105 L 115,105 Z"
        fill="#e8e4d8" stroke="#c8c4b8" stroke-width="1"/>
  <line x1="116" y1="88"  x2="184" y2="88"  stroke="#c8c4b8" stroke-width="0.7" opacity="0.6"/>
  <line x1="115" y1="94"  x2="185" y2="94"  stroke="#c8c4b8" stroke-width="0.7" opacity="0.6"/>
  <line x1="115" y1="100" x2="185" y2="100" stroke="#c8c4b8" stroke-width="0.7" opacity="0.6"/>

  <!-- Knit texture — subtle horizontal lines across body -->
  <g stroke="#c8c4b8" stroke-width="0.5" opacity="0.35">
    <line x1="64"  y1="135" x2="236" y2="135"/>
    <line x1="63"  y1="150" x2="237" y2="150"/>
    <line x1="63"  y1="165" x2="237" y2="165"/>
    <line x1="63"  y1="180" x2="237" y2="180"/>
    <line x1="63"  y1="195" x2="237" y2="195"/>
    <line x1="63"  y1="210" x2="237" y2="210"/>
    <line x1="63"  y1="225" x2="237" y2="225"/>
    <line x1="63"  y1="240" x2="237" y2="240"/>
    <line x1="63"  y1="255" x2="237" y2="255"/>
    <line x1="63"  y1="270" x2="237" y2="270"/>
    <line x1="63"  y1="285" x2="237" y2="285"/>
    <line x1="63"  y1="300" x2="237" y2="300"/>
  </g>

  <!-- Sleeve cuff ribbing left -->
  <line x1="41" y1="184" x2="81" y2="187" stroke="#c8c4b8" stroke-width="1.2"/>
  <line x1="40" y1="190" x2="81" y2="193" stroke="#c8c4b8" stroke-width="0.7" opacity="0.5"/>
  <!-- Sleeve cuff ribbing right -->
  <line x1="259" y1="184" x2="219" y2="187" stroke="#c8c4b8" stroke-width="1.2"/>
  <line x1="260" y1="190" x2="219" y2="193" stroke="#c8c4b8" stroke-width="0.7" opacity="0.5"/>

  <!-- Hem ribbing -->
  <line x1="63"  y1="310" x2="237" y2="310" stroke="#c8c4b8" stroke-width="1.2"/>
  <line x1="63"  y1="316" x2="237" y2="316" stroke="#c8c4b8" stroke-width="0.7" opacity="0.5"/>

  <!-- Shoulder seams (dashed) -->
  <line x1="88"  y1="105" x2="118" y2="105" stroke="#c8c4b8" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="212" y1="105" x2="182" y2="105" stroke="#c8c4b8" stroke-width="0.8" stroke-dasharray="4,3"/>
</svg>
